name: Publish dev-box image

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Optional image tag to attach (e.g. v1.2.3 or stable)'
        required: false
        default: ''

permissions:
  contents: read
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get image tags for this run
        id: get_tags
        run: |
          # Determine a chosen tag (from release or workflow input)
          chosen=""

          if [ "$GITHUB_EVENT_NAME" = "release" ]; then
            chosen="${{ github.event.release.tag_name }}"
          elif [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.tag }}" ]; then
            chosen="${{ github.event.inputs.tag }}"
          else
            chosen=""
          fi

          # Build up the list of tags to push (one per line)
          TAGS=""

          # Include 'latest' when running on main branch or when this is a release
          if [ "${GITHUB_REF#refs/heads/}" = "main" ] || [ "$GITHUB_EVENT_NAME" = "release" ]; then
            TAGS="ghcr.io/${{ github.repository_owner }}/dev-box:latest"
          fi

          # Always include the commit SHA tag
          TAGS="$TAGS"$'\n'"ghcr.io/${{ github.repository_owner }}/dev-box:${{ github.sha }}"

          # If a chosen tag exists, include it
          if [ -n "$chosen" ]; then
            TAGS="$TAGS"$'\n'"ghcr.io/${{ github.repository_owner }}/dev-box:${chosen}"
          fi

          # Remove any empty lines
          TAGS=$(echo "$TAGS" | sed '/^$/d')

          # Set outputs: the chosen tag (if any) and the full tags list
          echo "tag=$chosen" >> $GITHUB_OUTPUT
          echo "tags<<EOF" >> $GITHUB_OUTPUT
          echo "$TAGS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./src
          file: ./src/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.get_tags.outputs.tags }}
          attest: ''
